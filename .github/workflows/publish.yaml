name: Publish @neja-digital/react-ui

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://npm.pkg.github.com/
          scope: '@neja-digital'

      - name: Enable Corepack & install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
      
        - name: Configure npm auth for GitHub Packages
        run: |
          printf "%s\n" "//npm.pkg.github.com/:\_authToken=\${{ secrets.NPM\_TOKEN }}" "@neja-digital:registry=https://npm.pkg.github.com/" > ~/.npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build --if-present

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --registry=https://npm.pkg.github.com

